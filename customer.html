<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Customer</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0b0713;
      color:white;
    }

    .header{
      padding:15px;
      background:#1a0f2e;
      font-size:18px;
      font-weight:700;
    }
    .balance-box{
  display:flex;
  justify-content:space-between;
  padding:15px;
  gap:12px;
}

.box{
  flex:1;
  padding:18px;
  border-radius:12px;
  text-align:center;
}

    .received{background:#0f2d1f; color:#00ff9d;}
    .given{background:#2d0f0f; color:#ff4d4d;}

    .tx{
      padding:12px;
      border-bottom:1px solid #222;
    }

    .btns{
      position:fixed;
      bottom:0;
      left:0;
      right:0;
      display:flex;
    }

    .btns button{
      flex:1;
      padding:15px;
      border:none;
      font-weight:bold;
      color:white;
    }

    .recBtn{background:#00c853;}
    .givBtn{background:#d50000;}
    @media(max-width:600px){
  .balance-box{
    flex-direction:row;
  }
}
  </style>
</head>

<body>

<div class="header" id="name">Customer</div>

<div class="balance-box">
  <div class="box received">
    Received<br>
    <h2 id="rec">0</h2>
  </div>

  <div class="box given">
    Given<br>
    <h2 id="giv">0</h2>
  </div>
</div>

<h3 style="padding:10px">Transactions</h3>
<div id="list"></div>

<div class="btns">
  <button class="recBtn">Received</button>
  <button class="givBtn">Given</button>
</div>

<script>
const id = new URLSearchParams(location.search).get("id")

const accounts = JSON.parse(localStorage.getItem("SB_ACCOUNTS_v1") || "[]")
const tx = JSON.parse(localStorage.getItem("SB_TX_v1") || "[]")

const acc = accounts.find(a => a.id === id)

document.getElementById("name").innerText = acc ? acc.name : "Customer"

const list = tx.filter(t => t.acctId === id)

let rec = 0, giv = 0
let html = ""

list.forEach(t => {
  if(t.type === "credit") rec += Number(t.amount)
  else giv += Number(t.amount)

  html += `
    <div class="tx">
      <b>${t.type === "credit" ? "Received" : "Given"}</b> - ₹${t.amount}<br>
      ${t.category} | ${t.remark || ""}<br>
      <small>${t.date}</small>
    </div>
  `
})

document.getElementById("rec").innerText = rec
document.getElementById("giv").innerText = giv
document.getElementById("list").innerHTML = html || "<p style='padding:10px'>No transactions</p>"
</script>

</body>
</html>
